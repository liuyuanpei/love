<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗涵 ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: #0f0f10;
    color:white;
    font-family: 'Noto Sans SC', sans-serif;
    overflow:hidden;
}

h1{
    font-size:38px;
    color:#ff4b6e;
    letter-spacing:2px;
}

/* 文本 */
.text{
    font-size:24px;
    margin-top:20px;
    opacity:0;
    transform: translateY(20px) scale(0.9);
    transition: all 0.6s ease;
    text-align:center;
    padding:0 30px;
    color:#f5f5f5;
}

.show{
    opacity:1;
    transform: translateY(0) scale(1.05);
}

/* 当前歌词强调 */
.highlight{
    font-size:34px;
    color:#ff4b6e;
    text-shadow:0 0 15px rgba(255,75,110,0.6);
}

/* 按钮 */
button{
    margin-top:30px;
    padding:10px 25px;
    border:none;
    border-radius:20px;
    background:#ff4b6e;
    color:white;
    font-size:16px;
}

/* 爱心 */
.heart{
    position: fixed;
    top:-10px;
    color:rgba(255,75,110,0.6);
    animation: fall linear infinite;
}
@keyframes fall{
    to{ transform: translateY(100vh); }
}
</style>
</head>

<body>

<h1>罗涵 ❤️</h1>
<div id="text" class="text">点一下开始</div>
<button onclick="next()">点我</button>

<audio id="bgm" src="music.mp3"></audio>

<script>

const messages = [
"今天其实有点想你",
"不是突然想的",
"是一直在想",
"有些话我不太会说",
"但我还是想让你知道",
"这首歌代表我的心意 ❤️"
];

let step = 0;
let started = false;

const lrcText = `（这里保留你原来的歌词，不用动）`;

let lyrics = [];
lrcText.split("\n").forEach(line=>{
    const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if(m){
        lyrics.push({
            time: parseInt(m[1])*60 + parseFloat(m[2]),
            text: m[3]
        });
    }
});

let index = 0;
let startTime = 0;
let fixed = false;

function next(){

    if(step < messages.length){
        show(messages[step], false);
        step++;
        return;
    }

    if(!started){
        started = true;
        const music = document.getElementById("bgm");
        music.play();

        music.ontimeupdate = ()=>{

            if(!fixed && music.currentTime > 0.3){
                startTime = music.currentTime;
                fixed = true;
            }

            let current = music.currentTime - startTime + 0.3;

            if(index < lyrics.length && current >= lyrics[index].time){
                show(lyrics[index].text, true);
                index++;
            }
        };
    }
}

// ✨ 显示动画（升级版）
function show(text, isLyric){
    const el = document.getElementById("text");
    el.classList.remove("show","highlight");

    setTimeout(()=>{
        el.innerText = text;
        el.classList.add("show");

        if(isLyric){
            el.classList.add("highlight");
        }

    },200);
}

// ❤️ 爱心（更克制）
setInterval(()=>{
    const heart = document.createElement("div");
    heart.innerHTML = "❤";
    heart.className = "heart";
    heart.style.left = Math.random()*100+"vw";
    heart.style.fontSize = (8+Math.random()*15)+"px";
    heart.style.animationDuration = (4+Math.random()*6)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),8000);
},500);

</script>

</body>
</html>
