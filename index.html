<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗涵 ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#0b0b0c;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

/* 气泡 */
.text{
    font-size:26px;
    text-align:center;
    margin:20px;
    font-weight:600;
    letter-spacing:1px;
    padding:18px 22px;
    border-radius:20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    position:relative;
    cursor:pointer;
}

.text::after{
    content:"";
    position:absolute;
    left:25px;
    bottom:-10px;
    border:10px solid transparent;
    border-top-color:rgba(255,255,255,0.06);
}

/* 按钮 */
button{
    margin:10px;
    padding:10px 20px;
    border-radius:20px;
    border:none;
    background:#222;
    color:white;
    transition:0.3s;
}

/* 全屏提示 */
.fullText{
    position:fixed;
    left:0;top:0;
    width:100vw;height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    background:#0b0b0c;
    z-index:999;
}

/* ❤️ 爱心 */
.heart{
    position: fixed;
    top:-10px;
    color:#ff2e63;
    animation: fall linear forwards;
}
@keyframes fall{
    to{transform: translateY(100vh);opacity:0;}
}

/* 🐱 宠物 */
#pet{
    position:fixed;
    right:20px;
    bottom:20px;
    font-size:40px;
    animation: float 2s infinite;
}
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0);}
}

#petText{
    position:fixed;
    right:80px;
    bottom:90px;
    background:rgba(0,0,0,0.6);
    padding:6px 10px;
    border-radius:10px;
    font-size:14px;
    opacity:0;
    transition:0.3s;
}

/* 歌词模式 */
.lyric{
    font-size:34px !important;
    background:none !important;
    box-shadow:none !important;
    backdrop-filter:none !important;
}

/* 歌词动画 */
.fadeIn{
    animation: lyricFade 0.8s ease;
}

@keyframes lyricFade{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div id="text" class="text">点一下开始</div>
<audio id="bgm" src="music.mp3"></audio>

<div id="pet">🐱</div>
<div id="petText"></div>

<script>

// ===== 状态 =====
let stage="start";
let reject=0;

// ⭐ 记录选择
let answers = {
    q1: "",
    q2: ""
};

// ===== 表白 =====
const messages=[
"今天其实有点想你",
"不是突然想的",
"是一直在想",
"有些话我不太会说",
"但我还是想让你知道",
"这首歌代表我的心意 ❤️"
];

let step=0;

// ===== 歌词（不动）=====
const offset=0.5;
const lyrics=[/* 你的完整歌词（保持不变） */];

let index=0;

// ===== 点击 =====
document.getElementById("text").onclick=next;

function next(){
if(stage==="start"){stage="q1";showQ1();return;}
if(stage==="main"){
if(step<messages.length){setText(messages[step]);step++;}
else{startMusic();stage="music";}
}
}

// ===== 问题 =====
function showQ1(){
setText("你觉得我怎么样？");
createBtns(["好","很好"],(c)=>{
answers.q1 = c;
stage="q2";
showQ2();
});
}

function showQ2(){
setText("有没有兴趣做我女朋友？");

createBtns(["有","没有","没兴趣"],(c)=>{

answers.q2 = c;

if(c==="有"){
clearBtns();
stage="main";
step=0;
setText(messages[step]);
step++;
}else{
reject++;

let yes=document.getElementById("btn0");

if(reject===1){
    yes.style.transform="scale(1.6)";
}else if(reject===2){
    yes.style.transform="scale(2.2)";
    
    document.querySelectorAll("button").forEach(b=>{
        if(b.id!=="btn0"){
            b.style.transform="scale(0.6)";
            b.style.opacity="0.5";
        }
    });

}else{
clearBtns();

const div=document.createElement("div");
div.className="fullText";
div.innerText="那我再努努力让你喜欢我";
document.body.appendChild(div);

div.onclick=()=>{
div.remove();
stage="main";
step=0;
setText(messages[step]);
step++;
};
}
}
});
}

// ===== 音乐 =====
function startMusic(){

const music=document.getElementById("bgm");
music.play();

setInterval(()=>{
const h=document.createElement("div");
h.innerText="❤";
h.className="heart";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(12+Math.random()*20)+"px";
h.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
},300);

music.ontimeupdate=()=>{
let t=music.currentTime+offset;

if(index<lyrics.length && t>=lyrics[index].time){

setText(lyrics[index].text);

const el=document.getElementById("text");
el.classList.add("lyric");

el.classList.remove("fadeIn");
void el.offsetWidth;
el.classList.add("fadeIn");

index++;
}
};
}

// ===== 工具 =====
function setText(t){
document.getElementById("text").innerText=t;
}

function createBtns(arr,cb){
clearBtns();
arr.forEach((t,i)=>{
let b=document.createElement("button");
b.innerText=t;
b.id="btn"+i;
b.onclick=()=>cb(t);
document.body.appendChild(b);
});
}

function clearBtns(){
document.querySelectorAll("button").forEach(b=>b.remove());
}

// ===== 🐱 宠物 =====
const petLines=[
"在干嘛呀～",
"别犹豫了～",
"我觉得你们很般配欸",
"心动了！",
"试一试嘛"
];

function petSay(text){
const el=document.getElementById("petText");
el.innerText=text;
el.style.opacity=1;
setTimeout(()=>el.style.opacity=0,2000);
}

setInterval(()=>{
if(stage!=="music"){
const t=petLines[Math.floor(Math.random()*petLines.length)];
petSay(t);
}
},5000);

</script>

</body>
</html>
