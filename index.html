<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗涵 ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#0b0b0c;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

/* 💬 气泡（去粉色，走高级感） */
.text{
    font-size:26px;
    text-align:center;
    margin:20px;
    font-weight:600;
    letter-spacing:1px;
    padding:18px 22px;
    border-radius:20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    position:relative;
    cursor:pointer; /* ⭐ 可以点击 */
}

.text::after{
    content:"";
    position:absolute;
    left:25px;
    bottom:-10px;
    border:10px solid transparent;
    border-top-color:rgba(255,255,255,0.06);
}

/* ❌ 不再需要按钮 */
button{
    display:none;
}

/* 全屏提示 */
.fullText{
    position:fixed;
    left:0;
    top:0;
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    background:#0b0b0c;
    z-index:999;
}

/* ❤️ 爱心 */
.heart{
    position: fixed;
    top:-10px;
    color:#ff2e63;
    animation: fall linear forwards;
}
@keyframes fall{
    to{
        transform: translateY(100vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="text" class="text">点一下开始</div>

<audio id="bgm" src="music.mp3"></audio>

<script>

// ===== 状态 =====
let stage = "start";
let reject = 0;

// ===== 表白 =====
const messages = [
"今天其实有点想你",
"不是突然想的",
"是一直在想",
"有些话我不太会说",
"但我还是想让你知道",
"这首歌代表我的心意 ❤️"
];

let step = 0;

// ===== 歌词（完全你的版本）=====
const offset = 0.5;

const lyrics = [/* ⭐ 保持你原来的完整歌词，这里不动 */];

let index = 0;

// ===== 点击气泡开始 =====
document.getElementById("text").onclick = next;

function next(){

    if(stage==="start"){
        stage="q1";
        showQ1();
        return;
    }

    if(stage==="main"){
        if(step<messages.length){
            setText(messages[step]);
            step++;
        }else{
            startMusic();
            stage="music";
        }
    }
}

// ===== 问题 =====
function showQ1(){
    setText("你觉得我怎么样？");
    createBtns(["好","很好"], ()=>{
        stage="q2";
        showQ2();
    });
}

function showQ2(){
    setText("有没有兴趣做我的女朋友？");

    createBtns(["有","没有"], (c)=>{
        if(c==="有"){
            clearBtns();
            stage="main";
            step=0;
            setText(messages[step]);
            step++;
        }else{
            reject++;

            let yes=document.getElementById("btn0");
            let no=document.getElementById("btn1");

            if(reject===1){
                yes.style.transform="scale(1.3)";
            }else if(reject===2){
                yes.style.transform="scale(1.6)";
                no.style.transform="scale(0.6)";
            }else{
                // ⭐ 第三次：全屏一句话
                clearBtns();
                const div=document.createElement("div");
                div.className="fullText";
                div.innerText="那我再努努力让你喜欢我";
                document.body.appendChild(div);
            }
        }
    });
}

// ===== 音乐 =====
function startMusic(){

    const music=document.getElementById("bgm");
    music.play();

    // ❤️ 掉爱心
    setInterval(()=>{
        const h=document.createElement("div");
        h.innerText="❤";
        h.className="heart";
        h.style.left=Math.random()*100+"vw";
        h.style.fontSize=(12+Math.random()*20)+"px";
        h.style.animationDuration=(4+Math.random()*4)+"s";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),8000);
    },300);

    music.ontimeupdate=()=>{
        let t=music.currentTime+offset;

        if(index<lyrics.length && t>=lyrics[index].time){
            setText(lyrics[index].text);
            index++;
        }
    };
}

// ===== 工具 =====
function setText(t){
    document.getElementById("text").innerText=t;
}

function createBtns(arr,cb){
    clearBtns();
    arr.forEach((t,i)=>{
        let b=document.createElement("button");
        b.innerText=t;
        b.id="btn"+i;
        b.style.display="inline-block"; // ⭐ 显示按钮
        b.style.margin="10px";
        b.style.padding="10px 20px";
        b.style.borderRadius="20px";
        b.style.border="none";
        b.style.background="#222";
        b.style.color="white";

        b.onclick=()=>cb(t);
        document.body.appendChild(b);
    });
}

function clearBtns(){
    document.querySelectorAll("button").forEach(b=>b.remove());
}

</script>

</body>
</html>
