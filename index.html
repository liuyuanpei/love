// ====== 状态控制 ======
let stage = "start"; // start -> q1 -> q2 -> main -> music
let reject = 0;

// ====== 表白 ======
const messages = [

let step = 0;

// ====== 🔥 用你自己的歌词（完整保留） ======
const offset = 0.5;

const lyrics = [

{time:51.25,text:"我又能活下去 我又找回勇气"},
{time:58.00,text:"你的爱像氧气帮忙我呼吸"},
{time:65.65,text:"我又能呼吸 我又能呼吸"},
{time:75.00,text:"你就是不愿意放弃"},
{time:81.30,text:"生命中充满乱七八糟的问题"},
{time:85.10,text:"像走在没有出口的那个迷宫里"},
{time:91.00,text:"Oh no 一次又一次只会用借口逃避"},
{time:98.00,text:"怎么你从来没对我彻底的死心"},
{time:106.10,text:"我有何德何能值得你珍惜"},
{time:112.10,text:"为何你对我有求必应"},
{time:117.30,text:"每次一想到你 像雨过天晴"},
{time:123.60,text:"看见一只蝴蝶飞过废墟"},
{time:130.00,text:"是那么的美丽 就像一个奇迹"},
{time:136.30,text:"让我从倒下的地方站起"},

{time:146.00,text:"就觉得安心"},

{time:211.60,text:"是你让我找回新的生命"},
{time:217.90,text:"Yeah... 每次一见到你 就心存感激"},
{time:224.20,text:"现在我能坦然面对自己"},
{time:230.50,text:"我会永远珍惜 我会永远爱你"},
{time:236.80,text:"在我心底的你位置没有人能代替"},

];

let index = 0;
let started = false;

// ====== 主按钮 ======
function next(){

    if(stage === "start"){
        stage = "q1";
        showQ1();
        return;
    }

    if(stage === "main"){
        if(step < messages.length){
            show(messages[step], false);
            step++;
        }else{
            startMusic();
            stage = "music";
        }
    }
}

// ====== 问题1 ======
function showQ1(){
    setText("你觉得我怎么样？");
    createBtns(["好","很好"], ()=>{
        stage = "q2";
        showQ2();
    });
}

// ====== 问题2 ======
function showQ2(){
    setText("有没有兴趣做我的女朋友？");

    createBtns(["有","没有"], (c)=>{

        if(c === "有"){
            clearBtns();
            stage = "main";
            show(messages[0], false);
            step = 1;
        }else{
            reject++;

            let yes = document.getElementById("btn0");
            let no = document.getElementById("btn1");

            if(reject === 1){
                yes.style.transform="scale(1.3)";
            }else if(reject === 2){
                yes.style.transform="scale(1.6)";
                no.style.transform="scale(0.6)";
            }else{
                yes.style.position="fixed";
                yes.style.left="0";
                yes.style.top="0";
                yes.style.width="100vw";
                yes.style.height="100vh";
                yes.style.fontSize="40px";
            }
        }
    });
}

// ====== 音乐 + 歌词 ======
function startMusic(){
    const music = document.getElementById("bgm");

    music.play();

    music.ontimeupdate = ()=>{
        let t = music.currentTime + offset;

        if(index < lyrics.length && t >= lyrics[index].time){
            show(lyrics[index].text, true);
            index++;
        }
    };
}

// ====== UI ======
function show(t, isLyric){
    const el = document.getElementById("text");
    el.innerText = t;

    if(isLyric){
        el.style.fontSize = "34px";
        el.style.color = "#ff2e63";
    }else{
        el.style.fontSize = "24px";
        el.style.color = "white";
    }
}

function setText(t){
    document.getElementById("text").innerText = t;
}

function createBtns(arr, cb){
    clearBtns();
    arr.forEach((t,i)=>{
        let b = document.createElement("button");
        b.innerText = t;
        b.id = "btn"+i;
        b.onclick = ()=>cb(t);
        document.body.appendChild(b);
    });
}

function clearBtns(){
    document.querySelectorAll("button").forEach(b=>{
        if(b.getAttribute("onclick")) return;
        b.remove();
    });
}

</script>
