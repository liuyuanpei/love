<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗涵 ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#0f0f10;
    color:white;
    font-family:'Noto Sans SC', sans-serif;
    overflow:hidden;
}

h1{
    font-size:36px;
    color:#ff4b6e;
}

.text{
    font-size:24px;
    margin-top:20px;
    opacity:0;
    transform:translateY(20px) scale(0.9);
    transition:all 0.6s;
    text-align:center;
    padding:0 30px;
}

.show{
    opacity:1;
    transform:translateY(0) scale(1.05);
}

.highlight{
    font-size:34px;
    color:#ff4b6e;
    text-shadow:0 0 15px rgba(255,75,110,0.6);
}

button{
    margin-top:30px;
    padding:10px 25px;
    border:none;
    border-radius:20px;
    background:#ff4b6e;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<h1>罗涵 ❤️</h1>
<div id="text" class="text">点一下开始</div>
<button onclick="next()">点我</button>

<audio id="bgm" src="music.mp3"></audio>

<script>

// 表白话
const messages = [
"今天其实有点想你",
"不是突然想的",
"是一直在想",
"有些话我不太会说",
"但我还是想让你知道",
"这首歌代表我的心意 ❤️"
];

let step = 0;
let started = false;

// 歌词（完整）
const lrcText = `
[00:02.150]当这世界已经准备将我遗弃
[00:08.500]像一个伤兵被留在孤独荒野里
[00:14.850]开始怀疑我存在有没有意义
[00:21.200]在别人眼里我似乎变成了隐形
[00:27.550]难道失败就永远翻不了身
[00:33.900]谁来挽救坠落的灵魂
[00:40.250]每次一见到你 心里好平静
[00:46.600]就像一只蝴蝶飞过废墟
[00:52.950]我又能活下去 我又找回勇气
[00:59.300]你的爱像氧气帮忙我呼吸
[01:05.650]我又能呼吸 我又能呼吸
[01:12.000]你就是不愿意放弃
`;

let lyrics = [];
lrcText.split("\n").forEach(line=>{
    const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if(m){
        lyrics.push({
            time: parseInt(m[1])*60 + parseFloat(m[2]),
            text: m[3]
        });
    }
});

let index = 0;
let startTime = 0;
let fixed = false;

function next(){

    // 先显示表白
    if(step < messages.length){
        show(messages[step], false);
        step++;
        return;
    }

    // 开始播放音乐+歌词
    if(!started){
        started = true;
        const music = document.getElementById("bgm");

        music.play().catch(()=>{
            alert("点一下页面再点按钮");
        });

        music.ontimeupdate = ()=>{

            // 自动对齐
            if(!fixed && music.currentTime > 0.3){
                startTime = music.currentTime;
                fixed = true;
            }

            let current = music.currentTime - startTime + 0.3;

            if(index < lyrics.length && current >= lyrics[index].time){
                show(lyrics[index].text, true);
                index++;
            }
        };
    }
}

function show(text, isLyric){
    const el = document.getElementById("text");
    el.classList.remove("show","highlight");

    setTimeout(()=>{
        el.innerText = text;
        el.classList.add("show");
        if(isLyric) el.classList.add("highlight");
    },200);
}

</script>

</body>
</html>
