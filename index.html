<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗涵 ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
    font-family: 'Zhi Mang Xing', cursive;
    overflow:hidden;
}

h1{font-size:42px;}

.text{
    font-size:28px;
    margin-top:20px;
    opacity:0;
    transform: translateY(30px);
    transition: all 0.8s;
    text-align:center;
    padding:0 20px;
}

.show{
    opacity:1;
    transform: translateY(0);
}

button{
    margin-top:30px;
    padding:10px 25px;
    border:none;
    border-radius:20px;
    background:white;
    color:#ff4b5c;
    font-size:18px;
}

/* ❤️ 爱心 */
.heart{
    position: fixed;
    top:-10px;
    color:rgba(255,255,255,0.7);
    animation: fall linear infinite;
}
@keyframes fall{
    to{ transform: translateY(100vh); }
}
</style>
</head>

<body>

<h1>罗涵 ❤️</h1>
<div id="text" class="text">点一下开始</div>
<button onclick="next()">点我</button>

<audio id="bgm" src="music.mp3"></audio>

<script>

// 👉 你想说的话（先出现）
const messages = [
"今天其实有点想你",
"不是突然想的",
"是一直在想",
"有些话我不太会说",
"但我还是想让你知道",
"这首歌代表我的心意 ❤️"
];

let step = 0;
let startedMusic = false;

// 👉 你的歌词（LRC）
const lrcText = `
[00:02.150]当这世界已经准备将我遗弃
[00:08.500]像一个伤兵被留在孤独荒野里
[00:14.850]开始怀疑我存在有没有意义
[00:21.200]在别人眼里我似乎变成了隐形
[00:27.550]难道失败就永远翻不了身
[00:33.900]谁来挽救坠落的灵魂
[00:40.250]每次一见到你 心里好平静
[00:46.600]就像一只蝴蝶飞过废墟
[00:52.950]我又能活下去 我又找回勇气
[00:59.300]你的爱像氧气帮忙我呼吸
[01:05.650]我又能呼吸 我又能呼吸
[01:12.000]你就是不愿意放弃
`;

let lyrics = [];
lrcText.split("\n").forEach(line=>{
    const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if(m){
        lyrics.push({
            time: parseInt(m[1])*60 + parseFloat(m[2]),
            text: m[3]
        });
    }
});

let lrcIndex = 0;

function next(){
    const el = document.getElementById("text");

    // 👉 先播放你说的话
    if(step < messages.length){
        show(messages[step]);
        step++;
        return;
    }

    // 👉 到最后才开始音乐 + 歌词
    if(!startedMusic){
        startedMusic = true;
        document.getElementById("bgm").play();

        document.getElementById("bgm").ontimeupdate = function(){
            let current = this.currentTime;
            if(lrcIndex < lyrics.length && current >= lyrics[lrcIndex].time){
                show(lyrics[lrcIndex].text);
                lrcIndex++;
            }
        };
    }
}

function show(text){
    const el = document.getElementById("text");
    el.classList.remove("show");
    setTimeout(()=>{
        el.innerText = text;
        el.classList.add("show");
    },200);
}

// ❤️ 爱心
setInterval(()=>{
    const heart = document.createElement("div");
    heart.innerHTML = "❤";
    heart.className = "heart";
    heart.style.left = Math.random()*100+"vw";
    heart.style.fontSize = (10+Math.random()*20)+"px";
    heart.style.animationDuration = (3+Math.random()*5)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),8000);
},300);

</script>

</body>
</html>
