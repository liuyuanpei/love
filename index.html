<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗涵 ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#0b0b0c;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

/* 💬 聊天气泡 */
#chatBox{
    max-width: 80%;
    background: rgba(255,255,255,0.1);
    padding: 15px 20px;
    border-radius: 20px;
    font-size: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(255,46,99,0.2);
}

.typing{
    border-right: 2px solid #ff2e63;
    white-space: nowrap;
    overflow: hidden;
}

/* 按钮 */
button{
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background: linear-gradient(45deg,#ff2e63,#ff6b81);
    color:white;
    font-size:16px;
    transition:0.3s;
}
button:hover{
    transform: scale(1.1);
}

/* 全屏按钮 */
.full{
    position:fixed;
    left:0;top:0;
    width:100vw;height:100vh;
    font-size:40px;
}

/* 🐱 宠物 */
#pet{
    position: fixed;
    right: 20px;
    bottom: 20px;
    font-size: 48px;
    cursor: pointer;
    animation: idle 2s infinite;
}
@keyframes idle{
    0%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0);}
}

#petText{
    position: fixed;
    right: 80px;
    bottom: 100px;
    background: rgba(0,0,0,0.6);
    padding:8px 12px;
    border-radius:10px;
    font-size:14px;
    opacity:0;
    transition:0.3s;
}
</style>
</head>

<body>

<div id="chatBox"><div id="bubbleText">点一下开始</div></div>
<button id="mainBtn">点我</button>

<audio id="bgm" src="music.mp3"></audio>

<div id="pet">🐱</div>
<div id="petText"></div>

<script>

// ===== 状态 =====
let stage = "start";
let reject = 0;

// ===== 表白 =====
const messages = [
"今天其实有点想你",
"不是突然想的",
"是一直在想",
"有些话我不太会说",
"但我还是想让你知道",
"这首歌代表我的心意 ❤️"
];

let step = 0;

// ===== 歌词（完全你的版本）=====
const offset = 0.5;

const lyrics = [
{time:0.01,text:"当这世界已经准备将我遗弃"},
{time:6.00,text:"像一个伤兵被留在孤独荒野里"},
{time:13.85,text:"开始怀疑我存在有没有意义"},
{time:19.00,text:"在别人眼里我似乎变成了隐形"},
{time:27.15,text:"难道失败就永远翻不了身"},
{time:31.90,text:"谁来挽救坠落的灵魂"},
{time:38.05,text:"每次一见到你 心里好平静"},
{time:44.60,text:"就像一只蝴蝶飞过废墟"},
{time:51.25,text:"我又能活下去 我又找回勇气"},
{time:58.00,text:"你的爱像氧气帮忙我呼吸"},
{time:65.65,text:"我又能呼吸 我又能呼吸"},
{time:75.00,text:"你就是不愿意放弃"},
{time:81.30,text:"生命中充满乱七八糟的问题"},
{time:85.10,text:"像走在没有出口的那个迷宫里"},
{time:91.00,text:"Oh no 一次又一次只会用借口逃避"},
{time:98.00,text:"怎么你从来没对我彻底的死心"},
{time:106.10,text:"我有何德何能值得你珍惜"},
{time:112.10,text:"为何你对我有求必应"},
{time:117.30,text:"每次一想到你 像雨过天晴"},
{time:123.60,text:"看见一只蝴蝶飞过废墟"},
{time:130.00,text:"是那么的美丽 就像一个奇迹"},
{time:136.30,text:"让我从倒下的地方站起"},
{time:143.10,text:"Woo... 只要一靠近你"},
{time:146.00,text:"就觉得安心"},
{time:149.30,text:"你看着我的眼没有怀疑"},
{time:156.60,text:"你对我的相信"},
{time:159.90,text:"让我又能重生"},
{time:162.20,text:"不管世界多冷我还有你"},
{time:169.50,text:"我有你"},
{time:172.80,text:"爱我这样的人对你来说不容易"},
{time:179.10,text:"我的痛苦你也经历"},
{time:182.40,text:"你是唯一 陪我到天堂与地狱"},
{time:192.70,text:"每次一想到你"},
{time:195.00,text:"像雨过天晴 看见一只蝴蝶飞过了废墟"},
{time:205.30,text:"我能撑得下去 我会忘了过去"},
{time:211.60,text:"是你让我找回新的生命"},
{time:217.90,text:"Yeah... 每次一见到你 就心存感激"},
{time:224.20,text:"现在我能坦然面对自己"},
{time:230.50,text:"我会永远珍惜 我会永远爱你"},
{time:236.80,text:"在我心底的你位置没有人能代替"},
{time:248.10,text:"Yeah 你就是那唯一"}
];

let index = 0;

// ===== 打字效果 =====
function setText(text){
    const el = document.getElementById("bubbleText");
    el.innerText="";
    el.classList.add("typing");

    let i=0;
    let timer=setInterval(()=>{
        el.innerText+=text[i];
        i++;
        if(i>=text.length){
            clearInterval(timer);
            el.classList.remove("typing");
        }
    },40);
}

// ===== 主按钮 =====
document.getElementById("mainBtn").onclick = next;

function next(){

    if(stage==="start"){
        stage="q1";
        startPetTalk("q");
        showQ1();
        return;
    }

    if(stage==="main"){
        if(step<messages.length){
            setText(messages[step]);
            step++;
        }else{
            startMusic();
            stage="music";
        }
    }
}

// ===== 问题 =====
function showQ1(){
    setText("你觉得我怎么样？");
    createBtns(["好","很好"], ()=>{
        stage="q2";
        showQ2();
    });
}

function showQ2(){
    setText("有没有兴趣做我的女朋友？");

    createBtns(["有","没有"], (c)=>{
        if(c==="有"){
            clearBtns();
            stage="main";
            step=0;
            setText(messages[step]);
            step++;
            petSay("我就知道你会选这个 ❤️");
            startPetTalk("main");
        }else{
            reject++;
            let yes=document.getElementById("btn0");
            let no=document.getElementById("btn1");

            if(reject===1){
                yes.style.transform="scale(1.3)";
                petSay("再想想嘛 🥺");
            }else if(reject===2){
                yes.style.transform="scale(1.6)";
                no.style.transform="scale(0.6)";
                petSay("真的不考虑一下吗 😭");
            }else{
                yes.classList.add("full");
                petSay("别点那个了！！点这个！！");
            }
        }
    });
}

// ===== 音乐 =====
function startMusic(){
    stopPetTalk();

    const music=document.getElementById("bgm");
    music.play();

    music.ontimeupdate=()=>{
        let t=music.currentTime+offset;
        if(index<lyrics.length && t>=lyrics[index].time){
            document.getElementById("bubbleText").innerText=lyrics[index].text;
            index++;
        }
    };
}

// ===== 工具 =====
function createBtns(arr,cb){
    clearBtns();
    arr.forEach((t,i)=>{
        let b=document.createElement("button");
        b.innerText=t;
        b.id="btn"+i;
        b.onclick=()=>cb(t);
        document.body.appendChild(b);
    });
}

function clearBtns(){
    document.querySelectorAll("button").forEach(b=>{
        if(b.id!=="mainBtn") b.remove();
    });
}

// ===== 🐱 宠物 =====
let petTimer=null;

const petLinesMap={
    q:["在干嘛呀～","别犹豫了～","试一试嘛","我觉得你们很般配欸"],
    main:["心动了！","他会接纳你的","慢慢说出来就好","你做得很好"]
};

function petSay(text){
    const el=document.getElementById("petText");
    el.innerText=text;
    el.style.opacity=1;
    setTimeout(()=>el.style.opacity=0,2000);
}

function startPetTalk(type){
    stopPetTalk();
    petTimer=setInterval(()=>{
        const arr=petLinesMap[type];
        const t=arr[Math.floor(Math.random()*arr.length)];
        petSay(t);
    },6000);
}

function stopPetTalk(){
    if(petTimer){
        clearInterval(petTimer);
        petTimer=null;
    }
}

document.getElementById("pet").onclick=()=>{
    petSay("我在帮你加分呢 😎");
};

</script>

</body>
</html>
