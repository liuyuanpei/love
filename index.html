<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>罗涵 ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#0b0b0c;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

/* 气泡（高级感） */
.text{
    font-size:26px;
    text-align:center;
    margin:20px;
    font-weight:600;
    letter-spacing:1px;
    padding:18px 22px;
    border-radius:20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    position:relative;
    cursor:pointer;
}

.text::after{
    content:"";
    position:absolute;
    left:25px;
    bottom:-10px;
    border:10px solid transparent;
    border-top-color:rgba(255,255,255,0.06);
}

/* 按钮 */
button{
    margin:10px;
    padding:10px 20px;
    border-radius:20px;
    border:none;
    background:#222;
    color:white;
}

/* 全屏 */
.fullText{
    position:fixed;
    left:0;top:0;
    width:100vw;height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    background:#0b0b0c;
    z-index:999;
}

/* ❤️ 爱心 */
.heart{
    position: fixed;
    top:-10px;
    color:#ff2e63;
    animation: fall linear forwards;
}
@keyframes fall{
    to{transform: translateY(100vh);opacity:0;}
}

/* 🐱 宠物 */
#pet{
    position:fixed;
    right:20px;
    bottom:20px;
    font-size:40px;
    animation: float 2s infinite;
}
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0);}
}

#petText{
    position:fixed;
    right:80px;
    bottom:90px;
    background:rgba(0,0,0,0.6);
    padding:6px 10px;
    border-radius:10px;
    font-size:14px;
    opacity:0;
    transition:0.3s;
}
</style>
</head>

<body>

<div id="text" class="text">点一下开始</div>
<audio id="bgm" src="music.mp3"></audio>

<div id="pet">🐱</div>
<div id="petText"></div>

<script>

// ===== 状态 =====
let stage="start";
let reject=0;

// ===== 表白 =====
const messages=[
"今天其实有点想你",
"不是突然想的",
"是一直在想",
"有些话我不太会说",
"但我还是想让你知道",
"这首歌代表我的心意 ❤️"
];

let step=0;

// ===== 歌词（你的完整版）=====
const offset=0.5;
const lyrics=[
{time:0.01,text:"当这世界已经准备将我遗弃"},
{time:6.00,text:"像一个伤兵被留在孤独荒野里"},
{time:13.85,text:"开始怀疑我存在有没有意义"},
{time:19.00,text:"在别人眼里我似乎变成了隐形"},
{time:27.15,text:"难道失败就永远翻不了身"},
{time:31.90,text:"谁来挽救坠落的灵魂"},
{time:38.05,text:"每次一见到你 心里好平静"},
{time:44.60,text:"就像一只蝴蝶飞过废墟"},
{time:51.25,text:"我又能活下去 我又找回勇气"},
{time:58.00,text:"你的爱像氧气帮忙我呼吸"},
{time:65.65,text:"我又能呼吸 我又能呼吸"},
{time:75.00,text:"你就是不愿意放弃"},
{time:81.30,text:"生命中充满乱七八糟的问题"},
{time:85.10,text:"像走在没有出口的那个迷宫里"},
{time:91.00,text:"Oh no 一次又一次只会用借口逃避"},
{time:98.00,text:"怎么你从来没对我彻底的死心"},
{time:106.10,text:"我有何德何能值得你珍惜"},
{time:112.10,text:"为何你对我有求必应"},
{time:117.30,text:"每次一想到你 像雨过天晴"},
{time:123.60,text:"看见一只蝴蝶飞过废墟"},
{time:130.00,text:"是那么的美丽 就像一个奇迹"},
{time:136.30,text:"让我从倒下的地方站起"},
{time:143.10,text:"Woo... 只要一靠近你"},
{time:146.00,text:"就觉得安心"},
{time:149.30,text:"你看着我的眼没有怀疑"},
{time:156.60,text:"你对我的相信"},
{time:159.90,text:"让我又能重生"},
{time:162.20,text:"不管世界多冷我还有你"},
{time:169.50,text:"我有你"},
{time:172.80,text:"爱我这样的人对你来说不容易"},
{time:179.10,text:"我的痛苦你也经历"},
{time:182.40,text:"你是唯一 陪我到天堂与地狱"},
{time:192.70,text:"每次一想到你"},
{time:195.00,text:"像雨过天晴 看见一只蝴蝶飞过了废墟"},
{time:205.30,text:"我能撑得下去 我会忘了过去"},
{time:211.60,text:"是你让我找回新的生命"},
{time:217.90,text:"Yeah... 每次一见到你 就心存感激"},
{time:224.20,text:"现在我能坦然面对自己"},
{time:230.50,text:"我会永远珍惜 我会永远爱你"},
{time:236.80,text:"在我心底的你位置没有人能代替"},
{time:248.10,text:"Yeah 你就是那唯一"}
];

let index=0;

// ===== 点击 =====
document.getElementById("text").onclick=next;

function next(){
if(stage==="start"){stage="q1";showQ1();return;}
if(stage==="main"){
if(step<messages.length){setText(messages[step]);step++;}
else{startMusic();stage="music";}
}
}

// ===== 问题 =====
function showQ1(){
setText("你觉得我怎么样？");
createBtns(["好","很好"],()=>{stage="q2";showQ2();});
}

function showQ2(){
setText("有没有兴趣做我的女朋友？");

createBtns(["有","没有"],(c)=>{
if(c==="有"){
clearBtns();
stage="main";
step=0;
setText(messages[step]);
step++;
}else{
reject++;
let yes=document.getElementById("btn0");
let no=document.getElementById("btn1");

if(reject===1){
yes.style.transform="scale(1.3)";
}else if(reject===2){
yes.style.transform="scale(1.6)";
no.style.transform="scale(0.6)";
}else{
clearBtns();
const div=document.createElement("div");
div.className="fullText";
div.innerText="那我再努努力让你喜欢我";
document.body.appendChild(div);
}
}
});
}

// ===== 音乐 + 歌词 =====
function startMusic(){

const music=document.getElementById("bgm");
music.play();

// ❤️ 爱心
setInterval(()=>{
const h=document.createElement("div");
h.innerText="❤";
h.className="heart";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(12+Math.random()*20)+"px";
h.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
},300);

music.ontimeupdate=()=>{
let t=music.currentTime+offset;
if(index<lyrics.length && t>=lyrics[index].time){
setText(lyrics[index].text);
index++;
}
};
}

// ===== 工具 =====
function setText(t){
document.getElementById("text").innerText=t;
}

function createBtns(arr,cb){
clearBtns();
arr.forEach((t,i)=>{
let b=document.createElement("button");
b.innerText=t;
b.id="btn"+i;
b.onclick=()=>cb(t);
document.body.appendChild(b);
});
}

function clearBtns(){
document.querySelectorAll("button").forEach(b=>b.remove());
}

// ===== 🐱 宠物 =====
const petLines=[
"在干嘛呀～",
"别犹豫了～",
"我觉得你们很般配欸",
"心动了！",
"试一试嘛"
];

function petSay(text){
const el=document.getElementById("petText");
el.innerText=text;
el.style.opacity=1;
setTimeout(()=>el.style.opacity=0,2000);
}

setInterval(()=>{
if(stage!=="music"){
const t=petLines[Math.floor(Math.random()*petLines.length)];
petSay(t);
}
},5000);

</script>

</body>
</html>
